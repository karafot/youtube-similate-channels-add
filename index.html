<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Radar — Benzer Kanal Bulucu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #ff2d2d;
  --red2: #ff6b35;
  --bg: #080808;
  --s1: #111;
  --s2: #181818;
  --s3: #222;
  --border: rgba(255,255,255,0.07);
  --text: #f5f5f5;
  --muted: #666;
  --muted2: #999;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG GRID */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,45,45,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,45,45,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* GLOW TOP */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(255,45,45,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(8,8,8,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--red), var(--red2));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 14px; height: 14px; fill: white; }

.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.08em;
  background: linear-gradient(90deg, #fff 60%, #ff2d2d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: 0.05em;
}

main {
  position: relative;
  z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 4rem 1.5rem 6rem;
}

/* HERO */
.hero {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeUp 0.6s ease both;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--red);
  background: rgba(255,45,45,0.08);
  border: 1px solid rgba(255,45,45,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  margin-bottom: 1.25rem;
}
.hero-eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  line-height: 0.95;
  letter-spacing: 0.04em;
  margin-bottom: 1.25rem;
}
.hero h1 span { color: var(--red); }

.hero p {
  font-size: 15px;
  color: var(--muted2);
  line-height: 1.7;
  max-width: 420px;
  margin: 0 auto;
}

/* SEARCH */
.search-wrap {
  animation: fadeUp 0.6s 0.1s ease both;
  margin-bottom: 3rem;
}

.search-box {
  display: flex;
  gap: 0;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus-within {
  border-color: rgba(255,45,45,0.4);
  box-shadow: 0 0 0 3px rgba(255,45,45,0.08);
}

.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 16px 20px;
  font-size: 15px;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  outline: none;
}
.search-box input::placeholder { color: var(--muted); }

.search-btn {
  background: linear-gradient(135deg, var(--red), #cc1111);
  color: white;
  border: none;
  padding: 0 28px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.search-btn:hover { opacity: 0.9; }
.search-btn:active { transform: scale(0.98); }
.search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.search-btn svg { width: 16px; height: 16px; fill: white; }

/* STATUS */
#status {
  display: none;
  text-align: center;
  padding: 2rem;
  animation: fadeUp 0.3s ease both;
}
.status-inner {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--s3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-msg { font-size: 13px; color: var(--muted2); }

/* ERROR */
#error {
  display: none;
  background: rgba(255,45,45,0.06);
  border: 1px solid rgba(255,45,45,0.15);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 13px;
  color: #ff7070;
  margin-bottom: 1.5rem;
  animation: fadeUp 0.3s ease both;
}

/* SOURCE CARD */
.source-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 0.75rem;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.source-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--red), var(--red2), transparent);
}

.concept-box {
  background: rgba(255,45,45,0.05);
  border: 1px solid rgba(255,45,45,0.12);
  border-radius: 10px;
  padding: 10px 14px;
  margin-top: 10px;
  font-size: 13px;
  color: #ccc;
  line-height: 1.6;
}
.concept-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
}

/* SECTION HEADER */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 2rem 0 1rem;
  animation: fadeUp 0.4s 0.1s ease both;
}
.section-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.section-count {
  background: var(--red);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 20px;
  min-width: 20px;
  text-align: center;
}

/* RESULT CARDS */
.result-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem 1.2rem;
  margin-bottom: 8px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
  animation: fadeUp 0.4s ease both;
  cursor: default;
}
.result-card:hover {
  border-color: rgba(255,45,45,0.2);
  background: var(--s2);
  transform: translateY(-1px);
}

.ch-avatar {
  flex-shrink: 0;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
}
.ch-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.av-fallback {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--red), #880000);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.05em;
}

.ch-info { flex: 1; min-width: 0; }

.ch-top {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.ch-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  text-decoration: none;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 220px;
}
.ch-name:hover { color: var(--red); }

.ch-subs {
  font-size: 11px;
  color: var(--muted2);
  background: var(--s3);
  border-radius: 20px;
  padding: 2px 9px;
  white-space: nowrap;
  flex-shrink: 0;
}

.ch-why {
  font-size: 12px;
  color: var(--muted2);
  line-height: 1.55;
  font-style: italic;
}

.ch-link {
  flex-shrink: 0;
  color: var(--muted);
  text-decoration: none;
  padding: 4px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  margin-top: 2px;
}
.ch-link:hover { color: var(--text); background: var(--s3); }
.ch-link svg { width: 14px; height: 14px; display: block; fill: currentColor; }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: none; }
}

/* RESULT CARD STAGGER */
.result-card:nth-child(1) { animation-delay: 0.05s; }
.result-card:nth-child(2) { animation-delay: 0.10s; }
.result-card:nth-child(3) { animation-delay: 0.15s; }
.result-card:nth-child(4) { animation-delay: 0.20s; }
.result-card:nth-child(5) { animation-delay: 0.25s; }
.result-card:nth-child(6) { animation-delay: 0.30s; }
.result-card:nth-child(7) { animation-delay: 0.35s; }
.result-card:nth-child(8) { animation-delay: 0.40s; }
.result-card:nth-child(9) { animation-delay: 0.45s; }
.result-card:nth-child(10) { animation-delay: 0.50s; }

/* DISCOVERY BADGE */
.discovery-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
  margin-left: 4px;
  background: rgba(255,107,53,0.12);
  color: var(--red2);
  border: 1px solid rgba(255,107,53,0.25);
  flex-shrink: 0;
}

footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  letter-spacing: 0.05em;
}

.created-by {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  animation: fadeUp 1s 0.3s ease both;
}
.created-by span {
  background: linear-gradient(90deg, var(--red), var(--red2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 600;
  background-size: 200% auto;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M10 15V9l5 3z"/><path d="M21.58 7.19a2.76 2.76 0 0 0-1.94-1.95C17.88 4.75 12 4.75 12 4.75s-5.88 0-7.64.49A2.76 2.76 0 0 0 2.42 7.19 28.94 28.94 0 0 0 2 12a28.94 28.94 0 0 0 .42 4.81 2.76 2.76 0 0 0 1.94 1.95C6.12 19.25 12 19.25 12 19.25s5.88 0 7.64-.49a2.76 2.76 0 0 0 1.94-1.95A28.94 28.94 0 0 0 22 12a28.94 28.94 0 0 0-.42-4.81z"/></svg>
    </div>
    <span class="logo-text">YT RADAR</span>
  </div>
  <span class="badge">Gemini AI · YouTube API</span>
</header>

<main>
  <div class="hero">
    <div class="hero-eyebrow">İçerik Analizi</div>
    <h1>AYNI NİŞTEKİ<br><span>KANALLARI</span><br>KEŞFEDİN</h1>
    <p>İstediğin kanalı arat, aynı konseptteki benzer kanalları bul.</p>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="channelInput" placeholder="@kanaladi veya youtube.com/... veya kanal adı" />
      <button class="search-btn" onclick="startSearch()" id="searchBtn">
        <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        Analiz Et
      </button>
    </div>
  </div>

  <div id="status">
    <div class="status-inner">
      <div class="spinner"></div>
      <div class="status-msg" id="statusMsg">Yükleniyor...</div>
    </div>
  </div>
  <div id="error"></div>
  <div id="mainContent" style="display:none;"></div>
</main>

<footer>
  <div style="margin-bottom:10px;">YT RADAR · YouTube Data API v3 + Google Gemini AI</div>
  <div class="created-by">Created by <span>Aziz Giray Günister</span></div>
</footer>

<script>
const YT_KEY = 'AIzaSyD_I0K-QSgYbk5bMXa0OjTARgUGXICD1G8';
const GM_KEY = 'AIzaSyB_UmglLfgrNV2FTAAgn5Iw_qbQlPnzd90';
const GM_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GM_KEY;
const MIN_SUBS = 5000;

function setStatus(msg) {
  const el = document.getElementById('status');
  if (msg) { el.style.display = 'block'; document.getElementById('statusMsg').textContent = msg; }
  else { el.style.display = 'none'; }
}
function showError(msg) {
  const el = document.getElementById('error');
  el.style.display = 'block';
  el.textContent = '⚠ ' + msg;
}
function hideError() { document.getElementById('error').style.display = 'none'; }

function fmt(n) {
  if (!n) return '—';
  n = parseInt(n);
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M abone';
  if (n >= 1000) return Math.round(n/1000) + 'K abone';
  return n + ' abone';
}
function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function avatarEl(url, name, size) {
  const wrap = document.createElement('div');
  wrap.className = 'ch-avatar';
  wrap.style.cssText = 'width:' + size + 'px;height:' + size + 'px;';
  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.onerror = () => { img.remove(); const fb = document.createElement('div'); fb.className = 'av-fallback'; fb.style.fontSize = Math.round(size*0.3)+'px'; fb.textContent = initials(name); wrap.appendChild(fb); };
    wrap.appendChild(img);
  } else {
    const fb = document.createElement('div');
    fb.className = 'av-fallback';
    fb.style.fontSize = Math.round(size*0.3)+'px';
    fb.textContent = initials(name);
    wrap.appendChild(fb);
  }
  return wrap;
}

async function yt(path) {
  const res = await fetch('https://www.googleapis.com/youtube/v3/' + path + '&key=' + YT_KEY);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

async function gemini(prompt) {
  const res = await fetch(GM_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await res.json();
  if (data.error) throw new Error('Gemini: ' + data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function extractId(input) {
  input = input.trim();
  if (/^UC[\w-]{20,}$/.test(input)) return input;
  let handle = input;
  if (input.includes('youtube.com/@')) handle = input.split('youtube.com/@')[1].split(/[/?]/)[0];
  else if (input.includes('youtube.com/channel/')) return input.split('youtube.com/channel/')[1].split(/[/?]/)[0];
  else if (input.startsWith('@')) handle = input.slice(1);
  const data = await yt('search?part=snippet&type=channel&q=' + encodeURIComponent(handle) + '&maxResults=1');
  if (!data.items?.length) throw new Error('Kanal bulunamadı. @ ile tekrar dene.');
  return data.items[0].snippet.channelId;
}

async function startSearch() {
  const input = document.getElementById('channelInput').value;
  if (!input.trim()) return;
  hideError();
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('mainContent').innerHTML = '';

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;

  try {
    setStatus('Kanal aranıyor...');
    const id = await extractId(input);

    setStatus('Kanal bilgileri alınıyor...');
    const chRes = await yt('channels?part=snippet,statistics&id=' + id);
    if (!chRes.items?.length) throw new Error('Kanal bulunamadı.');
    const ch = chRes.items[0];
    const chName = ch.snippet.title;
    const chAvatar = ch.snippet.thumbnails?.medium?.url || ch.snippet.thumbnails?.default?.url || '';
    const chDesc = (ch.snippet.description || '').slice(0, 200);
    const chSubs = parseInt(ch.statistics?.subscriberCount || 0);

    setStatus('Son videolar inceleniyor...');
    const vRes = await yt('search?part=snippet&channelId=' + id + '&type=video&order=date&maxResults=5');
    const videoTitles = (vRes.items || []).map(v => v.snippet.title);

    setStatus('Gemini ile içerik analizi yapılıyor...');
    const prompt = `Sen bir YouTube içerik analistisin.

KANAL: "${chName}"
AÇIKLAMA: ${chDesc}
SON 5 VİDEO:
${videoTitles.map((t,i)=>(i+1)+'. '+t).join('\n')}

Bu kanalı analiz et. SADECE JSON döndür, başka hiçbir şey yazma:
{
  "concept": "Bu kanalın içerik konseptini net 1-2 cümle Türkçe açıkla",
  "queries": [
    "bu kanalın içeriğiyle birebir aynı konseptteki kanalları bulmak için YouTube arama sorgusu 1 (İngilizce)",
    "YouTube arama sorgusu 2 (İngilizce, farklı açıdan)",
    "YouTube arama sorgusu 3 (İngilizce, farklı açıdan)",
    "YouTube arama sorgusu 4 (İngilizce, farklı açıdan)"
  ]
}`;

    const raw = await gemini(prompt);
    const cleaned = raw.replace(/```json|```/g, '').trim();
    let geminiData;
    try { geminiData = JSON.parse(cleaned); }
    catch { throw new Error('AI yanıtı işlenemedi, tekrar dene.'); }

    const concept = geminiData.concept || '';
    const queries = geminiData.queries || [];

    // Kaynak kanal göster
    const content = document.getElementById('mainContent');
    content.style.display = 'block';

    const sourceCard = document.createElement('div');
    sourceCard.className = 'source-card';
    const av = avatarEl(chAvatar, chName, 56);
    const info = document.createElement('div');
    info.style.flex = '1';
    info.innerHTML =
      '<a href="https://youtube.com/channel/' + id + '" target="_blank" style="font-size:15px;font-weight:600;color:var(--text);text-decoration:none;">' + chName + '</a>' +
      '<div style="font-size:12px;color:var(--muted2);margin:3px 0 6px;">' + fmt(chSubs) + '</div>' +
      '<div style="font-size:13px;color:#aaa;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + chDesc + '</div>' +
      (concept ? '<div class="concept-box"><div class="concept-label">AI Konsept Analizi</div>' + concept + '</div>' : '');
    sourceCard.appendChild(av);
    sourceCard.appendChild(info);
    content.appendChild(sourceCard);

    setStatus('Benzer kanallar aranıyor...');
    const results = await Promise.all(
      queries.map(q =>
        yt('search?part=snippet&type=channel&q=' + encodeURIComponent(q) + '&maxResults=12')
          .then(d => (d.items || []).map(i => i.snippet.channelId))
          .catch(() => [])
      )
    );

    const seen = new Set([id]);
    const candidateIds = [];
    for (const arr of results) {
      for (const cid of arr) {
        if (!seen.has(cid) && candidateIds.length < 20) { seen.add(cid); candidateIds.push(cid); }
      }
    }

    if (!candidateIds.length) throw new Error('Benzer kanal bulunamadı.');

    setStatus('Kanal detayları alınıyor...');
    const detRes = await yt('channels?part=snippet,statistics&id=' + candidateIds.join(','));
    const candidates = (detRes.items || [])
      .filter(c => parseInt(c.statistics?.subscriberCount || 0) >= MIN_SUBS)
      .sort((a, b) => parseInt(b.statistics?.viewCount || 0) - parseInt(a.statistics?.viewCount || 0));

    if (!candidates.length) throw new Error('Yeterli aboneli benzer kanal bulunamadı.');

    setStatus('En benzer 7 kanal seçiliyor...');
    const summary = candidates.slice(0, 18).map((c,i) =>
      (i+1) + '. ID:' + c.id + ' | "' + c.snippet.title + '" | ' + fmt(c.statistics?.subscriberCount) + ' | ' + (c.snippet.description||'').slice(0,80)
    ).join('\n');

    const rankPrompt = `Kaynak kanal konsepti: "${concept}"

Aşağıdaki kanallardan SADECE gerçekten aynı içerik tipini yapanları seç. Alakasız olanları kesinlikle dahil etme. En benzer 7 tanesini listele.

SADECE JSON döndür:
{
  "ranked": [
    {"id": "kanal_id", "why": "neden benzer — 1 kısa Türkçe cümle"},
    ...
  ]
}

ADAYLAR:
${summary}`;

    let ranked = [];
    try {
      const rankRaw = await gemini(rankPrompt);
      const rankCleaned = rankRaw.replace(/```json|```/g, '').trim();
      ranked = JSON.parse(rankCleaned).ranked || [];
    } catch {
      ranked = candidates.slice(0,7).map(c => ({ id: c.id, why: '' }));
    }

    const channelMap = {};
    for (const c of candidates) channelMap[c.id] = c;

    const rankedIds = new Set(ranked.slice(0,7).map(r => r.id));
    const finalList = ranked.slice(0,7).map(r => ({ ch: channelMap[r.id], why: r.why, isDiscovery: false })).filter(x => x.ch);

    // 3 keşif kanalı — Gemini aynı nişten seçiyor, min 5000 abone, daha az popüler
    const discoveryPool = candidates.filter(c => !rankedIds.has(c.id) && parseInt(c.statistics?.subscriberCount || 0) >= MIN_SUBS);
    let discoveryList = [];
    if (discoveryPool.length >= 1) {
      const discSummary = discoveryPool.slice(0, 10).map((c,i) =>
        (i+1) + '. ID:' + c.id + ' | "' + c.snippet.title + '" | ' + fmt(c.statistics?.subscriberCount) + ' | ' + (c.snippet.description||'').slice(0,80)
      ).join('\n');

      const discPrompt = `Kaynak kanal konsepti: "${concept}"

Aşağıdaki kanallar arasından SADECE aynı nişte olan ama daha az bilinen/popüler olmayan 3 tanesini seç. Farklı niştekileri kesinlikle dahil etme. 3'ten az varsa sadece olanları ver.

SADECE JSON döndür:
{
  "discovery": [
    {"id": "kanal_id", "why": "neden aynı niş — 1 kısa Türkçe cümle"}
  ]
}

ADAYLAR:
${discSummary}`;

      try {
        const discRaw = await gemini(discPrompt);
        const discCleaned = discRaw.replace(/```json|```/g, '').trim();
        const discData = JSON.parse(discCleaned).discovery || [];
        discoveryList = discData.slice(0,3).map(r => ({ ch: channelMap[r.id], why: r.why })).filter(x => x.ch);
      } catch {
        discoveryList = discoveryPool.slice(0,3).map(c => ({ ch: c, why: 'Aynı nişte keşfetmeye değer bir kanal.' }));
      }
    }

    const allResults = [...finalList, ...discoveryList];

    if (!allResults.length) throw new Error('Uygun kanal bulunamadı, farklı bir kanal dene.');

    // Section header — benzer kanallar
    const secHeader = document.createElement('div');
    secHeader.className = 'section-header';
    secHeader.innerHTML =
      '<div class="section-line"></div>' +
      '<span class="section-title">Benzer Kanallar</span>' +
      '<span class="section-count">' + finalList.length + '</span>' +
      '<div class="section-line"></div>';
    content.appendChild(secHeader);

    // Benzer kanal kartları
    const resultList = document.createElement('div');
    for (const { ch, why, isDiscovery } of finalList) {
      const name = ch.snippet.title;
      const avUrl = ch.snippet.thumbnails?.default?.url || '';
      const url = 'https://youtube.com/channel/' + ch.id;

      const card = document.createElement('div');
      card.className = 'result-card';

      const chAv = avatarEl(avUrl, name, 44);
      const chInfo = document.createElement('div');
      chInfo.className = 'ch-info';
      chInfo.innerHTML =
        '<div class="ch-top">' +
          '<a href="' + url + '" target="_blank" class="ch-name">' + name + '</a>' +
          '<span class="ch-subs">' + fmt(ch.statistics?.subscriberCount) + '</span>' +
        '</div>' +
        (why ? '<div class="ch-why">' + why + '</div>' : '');

      const link = document.createElement('a');
      link.href = url;
      link.target = '_blank';
      link.className = 'ch-link';
      link.title = 'Kanala git';
      link.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      card.appendChild(chAv);
      card.appendChild(chInfo);
      card.appendChild(link);
      resultList.appendChild(card);
    }
    content.appendChild(resultList);

    // Keşif bölümü
    if (discoveryList.length) {
      const discHeader = document.createElement('div');
      discHeader.className = 'section-header';
      discHeader.innerHTML =
        '<div class="section-line"></div>' +
        '<span class="section-title">Keşif Kanalları</span>' +
        '<span class="section-count">' + discoveryList.length + '</span>' +
        '<div class="section-line"></div>';
      content.appendChild(discHeader);

      const discList = document.createElement('div');
      for (const { ch, why } of discoveryList) {
        const name = ch.snippet.title;
        const avUrl = ch.snippet.thumbnails?.default?.url || '';
        const url = 'https://youtube.com/channel/' + ch.id;

        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.borderColor = 'rgba(255,107,53,0.15)';

        const chAv = avatarEl(avUrl, name, 44);
        const chInfo = document.createElement('div');
        chInfo.className = 'ch-info';
        chInfo.innerHTML =
          '<div class="ch-top">' +
            '<a href="' + url + '" target="_blank" class="ch-name">' + name + '</a>' +
            '<span class="discovery-badge">Keşif</span>' +
            '<span class="ch-subs">' + fmt(ch.statistics?.subscriberCount) + '</span>' +
          '</div>' +
          '<div class="ch-why">' + why + '</div>';

        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.className = 'ch-link';
        link.title = 'Kanala git';
        link.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        card.appendChild(chAv);
        card.appendChild(chInfo);
        card.appendChild(link);
        discList.appendChild(card);
      }
      content.appendChild(discList);
    }

    setStatus('');

  } catch (err) {
    setStatus('');
    showError(err.message || 'Bir hata oluştu.');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('channelInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSearch();
});
</script>
</body>
</html>
