<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Benzer Kanal Bulucu</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #FF0000; --red-dark: #cc0000;
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #888;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border); padding: 1.25rem 2rem;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px); z-index: 100;
  }
  .logo { width: 32px; height: 32px; background: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 16px; height: 16px; fill: white; }
  header h1 { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.05em; }
  header span { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

  main { max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem; }

  .hero { text-align: center; margin-bottom: 2.5rem; }
  .hero h2 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 300; line-height: 1.2; margin-bottom: 0.75rem; }
  .hero h2 strong { font-weight: 600; color: var(--red); }
  .hero p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .search-box { display: flex; gap: 10px; margin-bottom: 2.5rem; }
  .search-box input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; font-size: 14px;
    font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--red); }
  .search-box button {
    background: var(--red); color: white; border: none; border-radius: 10px;
    padding: 14px 24px; font-size: 14px; font-weight: 600;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
  }
  .search-box button:hover { background: var(--red-dark); }
  .search-box button:active { transform: scale(0.97); }
  .search-box button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  #status { display: none; font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; text-align: center; padding: 1rem; }
  .loader {
    display: inline-block; width: 10px; height: 10px;
    border: 2px solid var(--border); border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #error {
    display: none; background: rgba(255,0,0,0.08); border: 1px solid rgba(255,0,0,0.2);
    border-radius: 10px; padding: 14px 18px; font-size: 13px; color: #ff6b6b; margin-bottom: 1.5rem;
  }

  .divider {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1rem;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  .source-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.25rem; margin-bottom: 2rem; display: flex; gap: 14px; align-items: flex-start;
  }
  .source-card img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .av {
    border-radius: 50%; background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; flex-shrink: 0;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--red); }
  .card-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: #aaa; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .concept-box {
    margin-top: 10px; background: var(--surface2); border-radius: 8px;
    padding: 8px 12px; font-size: 12px; color: #ccc; line-height: 1.5;
    border-left: 2px solid var(--red);
  }
  .concept-label { font-size: 10px; color: var(--red); font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 3px; }

  .result-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.1rem 1.25rem; margin-bottom: 10px;
    display: flex; gap: 14px; align-items: flex-start;
    animation: fadeIn 0.3s ease; transition: border-color 0.2s;
  }
  .result-card:hover { border-color: #3a3a3a; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .result-card img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .rav { width: 44px; height: 44px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; flex-shrink: 0; }
  .result-info { flex: 1; min-width: 0; }
  .result-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .result-top a { font-weight: 500; font-size: 14px; color: var(--text); text-decoration: none; }
  .result-top a:hover { color: var(--red); }
  .subs { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); }
  .result-why { font-size: 12px; color: #999; line-height: 1.5; margin-top: 4px; font-style: italic; }
  .ext-link { color: var(--muted); flex-shrink: 0; font-size: 18px; text-decoration: none; }
  .ext-link:hover { color: var(--text); }

  footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 3rem; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M10 15V9l5 3z"/><path d="M21.58 7.19a2.76 2.76 0 0 0-1.94-1.95C17.88 4.75 12 4.75 12 4.75s-5.88 0-7.64.49A2.76 2.76 0 0 0 2.42 7.19 28.94 28.94 0 0 0 2 12a28.94 28.94 0 0 0 .42 4.81 2.76 2.76 0 0 0 1.94 1.95C6.12 19.25 12 19.25 12 19.25s5.88 0 7.64-.49a2.76 2.76 0 0 0 1.94-1.95A28.94 28.94 0 0 0 22 12a28.94 28.94 0 0 0-.42-4.81z"/></svg>
  </div>
  <h1>BENZER KANAL BULUCU</h1>
  <span>Gemini AI · YouTube API v3</span>
</header>

<main>
  <div class="hero">
    <h2>Aynı içeriği yapan<br><strong>kanalları bul</strong></h2>
    <p>Kanal adını gir — içerik analizi yapıp aynı konseptteki 7 kanalı bul</p>
  </div>

  <div class="search-box">
    <input type="text" id="channelInput" placeholder="@kanaladi veya youtube.com/... veya UCxxxx" />
    <button onclick="startSearch()" id="searchBtn">Analiz Et</button>
  </div>

  <div id="status"></div>
  <div id="error"></div>
  <div id="mainContent" style="display:none;">
    <div class="divider">Analiz Edilen Kanal</div>
    <div id="sourceCard"></div>
    <div class="divider">Aynı Konseptteki Kanallar</div>
    <div id="resultList"></div>
  </div>
</main>

<footer>YouTube Data API v3 + Gemini AI ile güçlendirilmiştir</footer>

<script>
const YT_KEY  = 'AIzaSyD_I0K-QSgYbk5bMXa0OjTARgUGXICD1G8';
const GM_KEY  = 'AIzaSyDasZkw2jYy36e6t9c3Xeg4ZAedl_--jVE';
const GM_URL  = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GM_KEY;

function setStatus(msg) {
  const el = document.getElementById('status');
  if (msg) { el.style.display = 'block'; el.innerHTML = '<span class="loader"></span>' + msg; }
  else { el.style.display = 'none'; }
}
function showError(msg) { const el = document.getElementById('error'); el.style.display = 'block'; el.textContent = '⚠ ' + msg; }
function hideError() { document.getElementById('error').style.display = 'none'; }

function fmt(n) {
  if (!n) return '—';
  n = parseInt(n);
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M abone';
  if (n >= 1000) return Math.round(n/1000) + 'K abone';
  return n + ' abone';
}
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function avatarHTML(url, name, size) {
  const s = size + 'px';
  const fs = Math.round(size * 0.32) + 'px';
  if (url) return '<img src="' + url + '" style="width:' + s + ';height:' + s + ';border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
    '<div class="av" style="width:' + s + ';height:' + s + ';font-size:' + fs + ';display:none;">' + initials(name) + '</div>';
  return '<div class="av" style="width:' + s + ';height:' + s + ';font-size:' + fs + ';">' + initials(name) + '</div>';
}

async function yt(path) {
  const res = await fetch('https://www.googleapis.com/youtube/v3/' + path + '&key=' + YT_KEY);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data;
}

async function gemini(prompt) {
  const res = await fetch(GM_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await res.json();
  if (data.error) throw new Error('Gemini: ' + data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function extractId(input) {
  input = input.trim();
  if (/^UC[\w-]{20,}$/.test(input)) return input;
  let handle = input;
  if (input.includes('youtube.com/@')) handle = input.split('youtube.com/@')[1].split(/[/?]/)[0];
  else if (input.includes('youtube.com/channel/')) return input.split('youtube.com/channel/')[1].split(/[/?]/)[0];
  else if (input.startsWith('@')) handle = input.slice(1);
  const data = await yt('search?part=snippet&type=channel&q=' + encodeURIComponent(handle) + '&maxResults=1');
  if (!data.items?.length) throw new Error('Kanal bulunamadı. @ ile tekrar dene.');
  return data.items[0].snippet.channelId;
}

async function startSearch() {
  const input = document.getElementById('channelInput').value;
  if (!input.trim()) return;
  hideError();
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('resultList').innerHTML = '';

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = 'Analiz ediliyor...';

  try {
    // 1. Kanal ID bul
    setStatus('Kanal aranıyor...');
    const id = await extractId(input);

    // 2. Kanal bilgileri
    setStatus('Kanal bilgileri alınıyor...');
    const chRes = await yt('channels?part=snippet,statistics&id=' + id);
    if (!chRes.items?.length) throw new Error('Kanal bulunamadı.');
    const ch = chRes.items[0];
    const chName = ch.snippet.title;
    const chAvatar = ch.snippet.thumbnails?.medium?.url || ch.snippet.thumbnails?.default?.url || '';
    const chDesc = (ch.snippet.description || '').slice(0, 200);

    // 3. Son 5 video başlığı
    setStatus('Son videolar inceleniyor...');
    const vRes = await yt('search?part=snippet&channelId=' + id + '&type=video&order=date&maxResults=5');
    const videoTitles = (vRes.items || []).map(v => v.snippet.title);

    // 4. TEK GEMINI PROMPT — konsept analizi + arama sorguları birlikte
    setStatus('İçerik analizi yapılıyor...');
    const prompt = `Sen bir YouTube içerik analistisin. Aşağıdaki kanalı analiz et.

KANAL: "${chName}"
AÇIKLAMA: ${chDesc}
SON 5 VİDEO BAŞLIĞI:
${videoTitles.map((t,i) => (i+1)+'. '+t).join('\n')}

Bu kanalın içerik konseptini anla. Sadece JSON döndür, başka hiçbir şey yazma:
{
  "concept": "Bu kanalın içerik konseptini 1-2 cümleyle Türkçe açıkla",
  "queries": ["bu kanalın içeriğiyle birebir aynı konseptte kanallar bulmak için 4 farklı YouTube arama sorgusu (İngilizce, kanal adından bağımsız, içeriğe odaklı)"]
}`;

    const raw = await gemini(prompt);
    const cleaned = raw.replace(/```json|```/g, '').trim();
    let geminiData;
    try { geminiData = JSON.parse(cleaned); }
    catch { throw new Error('AI yanıtı işlenemedi, tekrar dene.'); }

    const concept = geminiData.concept || '';
    const queries = geminiData.queries || [];

    // Kaynak kanalı göster
    document.getElementById('sourceCard').innerHTML =
      '<div class="source-card">' +
        avatarHTML(chAvatar, chName, 56) +
        '<div style="flex:1;min-width:0;">' +
          '<div class="card-title"><a href="https://youtube.com/channel/' + id + '" target="_blank">' + chName + '</a></div>' +
          '<div class="card-meta">' + fmt(ch.statistics?.subscriberCount) + '</div>' +
          '<div class="card-desc">' + chDesc + '</div>' +
          (concept ? '<div class="concept-box"><div class="concept-label">AI KONSEPTi</div>' + concept + '</div>' : '') +
        '</div>' +
      '</div>';
    document.getElementById('mainContent').style.display = 'block';

    // 5. YouTube araması — sorguları paralel çalıştır
    setStatus('Benzer kanallar aranıyor...');
    const searchResults = await Promise.all(
      queries.map(q =>
        yt('search?part=snippet&type=channel&q=' + encodeURIComponent(q) + '&maxResults=10')
          .then(d => (d.items || []).map(i => i.snippet.channelId))
          .catch(() => [])
      )
    );

    // Tekrarları temizle, kaynak kanalı çıkar, max 14 ID al
    const seen = new Set([id]);
    const candidateIds = [];
    for (const arr of searchResults) {
      for (const cid of arr) {
        if (!seen.has(cid) && candidateIds.length < 14) { seen.add(cid); candidateIds.push(cid); }
      }
    }

    if (!candidateIds.length) throw new Error('Benzer kanal bulunamadı, farklı bir kanal dene.');

    // 6. Kanal detayları
    setStatus('Kanal detayları alınıyor...');
    const detRes = await yt('channels?part=snippet,statistics&id=' + candidateIds.join(','));
    const candidates = detRes.items || [];

    // 7. Sadece 7 tane göster — en yüksek abone sayılıları al (hızlı filtre, Gemini harcama yok)
    // Sonra içerik benzerliğine göre sıralamak için Gemini ile tek seferde kontrol
    const top14 = candidates.slice(0, 14);
    const candidateSummary = top14.map((c,i) =>
      (i+1) + '. ID:' + c.id + ' | "' + c.snippet.title + '" | ' + fmt(c.statistics?.subscriberCount) + ' | ' + (c.snippet.description||'').slice(0,80)
    ).join('\n');

    setStatus('En benzer 7 kanal seçiliyor...');
    const rankPrompt = `Kaynak kanal konsepti: "${concept}"

Aşağıdaki aday kanalları bu konseptle ne kadar örtüştüğüne göre sırala. Sadece JSON döndür:
{
  "ranked": [
    {"id": "<kanal id>", "why": "<neden benzer — 1 kısa Türkçe cümle>"},
    ... (sadece en benzer 7 tanesini listele)
  ]
}

ADAYLAR:
${candidateSummary}`;

    let ranked = [];
    try {
      const rankRaw = await gemini(rankPrompt);
      const rankCleaned = rankRaw.replace(/```json|```/g, '').trim();
      const rankData = JSON.parse(rankCleaned);
      ranked = rankData.ranked || [];
    } catch {
      // Gemini başarısız olursa ilk 7'yi al
      ranked = top14.slice(0,7).map(c => ({ id: c.id, why: '' }));
    }

    // Sonuçları render et
    const channelMap = {};
    for (const c of candidates) channelMap[c.id] = c;

    const finalList = ranked.slice(0,7).map(r => ({ ch: channelMap[r.id], why: r.why })).filter(x => x.ch);

    if (!finalList.length) throw new Error('Uygun kanal bulunamadı, tekrar dene.');

    document.getElementById('resultList').innerHTML = finalList.map(({ ch, why }) => {
      const name = ch.snippet.title;
      const av = ch.snippet.thumbnails?.default?.url || '';
      const url = 'https://youtube.com/channel/' + ch.id;
      return '<div class="result-card">' +
        avatarHTML(av, name, 44) +
        '<div class="result-info">' +
          '<div class="result-top">' +
            '<a href="' + url + '" target="_blank">' + name + '</a>' +
            '<span class="subs">' + fmt(ch.statistics?.subscriberCount) + '</span>' +
          '</div>' +
          (why ? '<div class="result-why">' + why + '</div>' : '') +
        '</div>' +
        '<a href="' + url + '" target="_blank" class="ext-link">↗</a>' +
      '</div>';
    }).join('');

    setStatus('');
  } catch (err) {
    setStatus('');
    showError(err.message || 'Bilinmeyen hata.');
  } finally {
    btn.disabled = false; btn.textContent = 'Analiz Et';
  }
}

document.getElementById('channelInput').addEventListener('keydown', e => { if (e.key === 'Enter') startSearch(); });
</script>
</body>
</html>
